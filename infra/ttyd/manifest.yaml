apiVersion: nazar.dev/v1
kind: BridgeManifest
metadata:
  name: ttyd
  description: Web terminal (ttyd) for browser-based shell access
  version: "1.0.0"
  channel: infra

containers:
  - name: nazar-ttyd
    image: docker.io/tsl0922/ttyd:latest
    description: Nazar Web Terminal (ttyd)
    publishPorts:
      - "{{port}}:7681"

configSchema:
  - name: port
    type: number
    required: false
    description: "Host port to expose ttyd on"
    default: 7681
