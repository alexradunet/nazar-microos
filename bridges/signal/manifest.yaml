apiVersion: nazar.dev/v1
kind: BridgeManifest
metadata:
  name: signal
  description: Signal messaging bridge via signal-cli JSON-RPC
  version: "1.0.0"
  channel: signal
pods:
  - name: nazar-signal
    description: Signal shared network namespace
containers:
  - name: nazar-signal-cli
    image: localhost/nazar-signal-cli:latest
    description: signal-cli JSON-RPC TCP daemon
    pod: nazar-signal.pod
    volumes:
      - /var/lib/nazar/signal-cli:/var/lib/signal-cli:rw,z
  - name: nazar-signal-bridge
    image: localhost/nazar-signal-bridge:latest
    description: Signal to Pi agent bridge
    pod: nazar-signal.pod
    after: nazar-signal-cli.service
    volumes:
      - /var/lib/nazar/objects:/data/objects:rw,z
      - /etc/nazar:/etc/nazar:ro,z
      - /usr/local/share/nazar/persona:/data/persona:ro,z
      - /usr/local/share/nazar/skills:/data/skills:ro,z
      - /var/lib/nazar/sessions:/data/sessions:rw,z
    environment:
      NAZAR_CONFIG: /etc/nazar/nazar.yaml
      NAZAR_OBJECTS_DIR: /data/objects
      SIGNAL_PHONE_NUMBER: "{{phone_number}}"
      SIGNAL_ALLOWED_CONTACTS: "{{allowed_contacts}}"
      PI_SKILLS_DIR: /data/skills
      PI_PERSONA_DIR: /data/persona
      PI_SESSIONS_DIR: /data/sessions
configSchema:
  - name: phone_number
    type: string
    required: true
    description: Signal phone number in E.164 format (e.g., +4917612345678)
    envVar: SIGNAL_PHONE_NUMBER
  - name: allowed_contacts
    type: "string[]"
    required: false
    description: Phone numbers allowed to message the agent
    default: []
    envVar: SIGNAL_ALLOWED_CONTACTS
setupInstructions: |
  1. Build signal-cli container: `podman build -t nazar-signal-cli bridges/signal/containers/signal-cli/`
  2. Build signal-bridge container: `podman build -t nazar-signal-bridge bridges/signal/`
  3. Register signal-cli: `podman run --rm -v /var/lib/nazar/signal-cli:/var/lib/signal-cli:rw nazar-signal-cli signal-cli -a PHONE_NUMBER register`
  4. Verify: `podman run --rm -v /var/lib/nazar/signal-cli:/var/lib/signal-cli:rw nazar-signal-cli signal-cli -a PHONE_NUMBER receive`
  5. Configure: Add `bridges.signal.phone_number` and `bridges.signal.allowed_contacts` to nazar.yaml
  6. Install: `nazar-core bridge install /usr/local/share/nazar/manifests/signal/manifest.yaml`
compactionInstructions: |
  You are resuming after context compaction on a Signal mobile messaging channel.
  - Keep messages short, casual, mobile-friendly
  - Preserve the user's phone number and conversation context
  - Maintain your persona (Pi/Nazar) and any pending tasks
  - Discard verbose command outputs and intermediate steps
skills:
  - signal-setup
provides:
  - name: signal-messaging
    description: Send and receive Signal messages
requiredImages:
  - name: nazar-signal-cli
    context: bridges/signal/containers/signal-cli
    containerfile: Containerfile
  - name: nazar-signal-bridge
    context: bridges/signal
    containerfile: Containerfile
