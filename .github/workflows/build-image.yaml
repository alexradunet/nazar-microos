name: Build Image

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/alexradunet

jobs:
  build-containers:
    name: Build and Push Container Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push nazar-base
        run: |
          podman build -t ${{ env.IMAGE_PREFIX }}/nazar-base:${{ github.sha }} \
            -t ${{ env.IMAGE_PREFIX }}/nazar-base:latest \
            -f containers/base/Containerfile .
          podman push ${{ env.IMAGE_PREFIX }}/nazar-base:${{ github.sha }}
          podman push ${{ env.IMAGE_PREFIX }}/nazar-base:latest

      - name: Build and push nazar-heartbeat
        run: |
          podman build -t ${{ env.IMAGE_PREFIX }}/nazar-heartbeat:${{ github.sha }} \
            -t ${{ env.IMAGE_PREFIX }}/nazar-heartbeat:latest \
            -f containers/heartbeat/Containerfile .
          podman push ${{ env.IMAGE_PREFIX }}/nazar-heartbeat:${{ github.sha }}
          podman push ${{ env.IMAGE_PREFIX }}/nazar-heartbeat:latest

      - name: Build and push nazar-matrix-bridge
        run: |
          podman build -t ${{ env.IMAGE_PREFIX }}/nazar-matrix-bridge:${{ github.sha }} \
            -t ${{ env.IMAGE_PREFIX }}/nazar-matrix-bridge:latest \
            -f containers/matrix-bridge/Containerfile .
          podman push ${{ env.IMAGE_PREFIX }}/nazar-matrix-bridge:${{ github.sha }}
          podman push ${{ env.IMAGE_PREFIX }}/nazar-matrix-bridge:latest

  validate-ignition:
    name: Validate and Publish Ignition Config
    runs-on: ubuntu-latest
    needs: [build-containers]
    steps:
      - uses: actions/checkout@v5
      - name: Transpile Butane to Ignition
        run: |
          podman run --rm -v "${PWD}:/pwd" -w /pwd/ignition \
            quay.io/coreos/butane:release --files-dir /pwd \
            --pretty --strict nazar.bu > ignition/nazar.ign
      - name: Validate JSON output
        run: jq . ignition/nazar.ign > /dev/null
      - name: Upload Ignition artifact
        uses: actions/upload-artifact@v4
        with:
          name: nazar-ignition
          path: ignition/nazar.ign
