name: Build Image

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/alexradunet

jobs:
  build-containers:
    name: Build and Push Container Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push nazar-base
        run: |
          podman build -t ${{ env.IMAGE_PREFIX }}/nazar-base:${{ github.sha }} \
            -t ${{ env.IMAGE_PREFIX }}/nazar-base:latest \
            -f containers/base/Containerfile .
          podman push ${{ env.IMAGE_PREFIX }}/nazar-base:${{ github.sha }}
          podman push ${{ env.IMAGE_PREFIX }}/nazar-base:latest

      - name: Build and push nazar-heartbeat
        run: |
          podman build -t ${{ env.IMAGE_PREFIX }}/nazar-heartbeat:${{ github.sha }} \
            -t ${{ env.IMAGE_PREFIX }}/nazar-heartbeat:latest \
            -f containers/heartbeat/Containerfile .
          podman push ${{ env.IMAGE_PREFIX }}/nazar-heartbeat:${{ github.sha }}
          podman push ${{ env.IMAGE_PREFIX }}/nazar-heartbeat:latest

      - name: Build and push nazar-signal-cli
        run: |
          podman build -t ${{ env.IMAGE_PREFIX }}/nazar-signal-cli:${{ github.sha }} \
            -t ${{ env.IMAGE_PREFIX }}/nazar-signal-cli:latest \
            -f containers/signal-cli/Containerfile .
          podman push ${{ env.IMAGE_PREFIX }}/nazar-signal-cli:${{ github.sha }}
          podman push ${{ env.IMAGE_PREFIX }}/nazar-signal-cli:latest

      - name: Build and push nazar-signal-bridge
        run: |
          podman build -t ${{ env.IMAGE_PREFIX }}/nazar-signal-bridge:${{ github.sha }} \
            -t ${{ env.IMAGE_PREFIX }}/nazar-signal-bridge:latest \
            -f containers/signal-bridge/Containerfile .
          podman push ${{ env.IMAGE_PREFIX }}/nazar-signal-bridge:${{ github.sha }}
          podman push ${{ env.IMAGE_PREFIX }}/nazar-signal-bridge:latest

  build-os-image:
    name: Build and Push OS Image
    runs-on: ubuntu-latest
    needs: [build-containers]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push nazar-os
        run: |
          podman build -t ${{ env.IMAGE_PREFIX }}/nazar-os:${{ github.sha }} \
            -t ${{ env.IMAGE_PREFIX }}/nazar-os:latest \
            -f Containerfile .
          podman push ${{ env.IMAGE_PREFIX }}/nazar-os:${{ github.sha }}
          podman push ${{ env.IMAGE_PREFIX }}/nazar-os:latest
