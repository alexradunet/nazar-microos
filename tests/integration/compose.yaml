services:
  signal-bridge:
    image: nazar-signal-bridge
    container_name: nazar-test-bridge
    environment:
      NAZAR_SIGNAL_PHONE: "+12345678901"
      NAZAR_OBJECTS_DIR: /data/objects
      NAZAR_SIGNAL_STORAGE_DIR: /data/signal-storage
    volumes:
      - bridge-data:/data

volumes:
  bridge-data:
