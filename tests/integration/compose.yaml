services:
  signal-bridge:
    image: pibloom-signal-bridge
    container_name: pibloom-test-bridge
    environment:
      PIBLOOM_SIGNAL_PHONE: "+12345678901"
      PIBLOOM_OBJECTS_DIR: /data/objects
      PIBLOOM_SIGNAL_STORAGE_DIR: /data/signal-storage
    volumes:
      - bridge-data:/data

volumes:
  bridge-data:
