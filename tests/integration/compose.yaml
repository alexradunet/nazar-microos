services:
  matrix-bridge:
    image: nazar-matrix-bridge
    container_name: nazar-test-bridge
    environment:
      NAZAR_MATRIX_HOMESERVER: https://matrix.org
      NAZAR_MATRIX_ACCESS_TOKEN: test-token
      NAZAR_OBJECTS_DIR: /data/objects
    volumes:
      - bridge-data:/data

volumes:
  bridge-data:
