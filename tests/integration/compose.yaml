services:
  conduit:
    image: docker.io/matrixconduit/matrix-conduit:latest
    container_name: nazar-test-conduit
    environment:
      CONDUIT_SERVER_NAME: localhost
      CONDUIT_DATABASE_BACKEND: rocksdb
      CONDUIT_DATABASE_PATH: /var/lib/matrix-conduit
      CONDUIT_ADDRESS: "0.0.0.0"
      CONDUIT_PORT: "6167"
      CONDUIT_ALLOW_REGISTRATION: "true"
      CONDUIT_CONFIG: ""
    ports:
      - "6167:6167"
    volumes:
      - conduit-data:/var/lib/matrix-conduit

  matrix-bridge:
    image: nazar-matrix-bridge
    container_name: nazar-test-bridge
    environment:
      NAZAR_MATRIX_HOMESERVER: http://conduit:6167
      NAZAR_MATRIX_ACCESS_TOKEN: test-token
      NAZAR_OBJECTS_DIR: /data/objects
    volumes:
      - bridge-data:/data
    # Bridge will fail to fully connect without valid credentials,
    # but the container should at least start and attempt connection.

volumes:
  conduit-data:
  bridge-data:
